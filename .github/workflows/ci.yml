name: CI

on:
  workflow_dispatch: {}
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_RETRY: "10"

jobs:
  rustfmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Install stable toolchain with rustfmt available
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Run rustfmt
        run: cd rust && cargo fmt --all -- --check

  swiftformat:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - name: Install SwiftFormat
        run: brew install swiftformat
      - name: SwiftFormat
        run: swiftformat --lint ios --reporter github-actions-log --swiftversion 6

  ktlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Run ktlint
        run: cd android && ./gradlew ktlintCheck

  compile-android:
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
          cache-bin: false
          prefix-key: v1-rust

      - name: Set up just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install build dependencies
        run: cd rust && cargo xtask install-deps

      - name: Build Rust FFI and generate Kotlin bindings
        run: just build-android

      - name: Verify Android bindings are up to date
        shell: bash
        run: |
          bindings_path="android/app/src/main/java/org/bitcoinppl/cove_core"
          status="$(git status --porcelain --untracked-files=all -- "$bindings_path")"

          if [[ -n "$status" ]]; then
            echo "Android bindings are out of date. Run 'just build-android' and commit the regenerated bindings."
            echo
            git status --short --untracked-files=all -- "$bindings_path"
            echo
            git diff --stat -- "$bindings_path" || true
            exit 1
          fi

      - name: Compile Android
        run: cd android && ./gradlew assembleDevDebug

  compile-ios:
    runs-on: macos-26
    env:
      RUSTFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
          cache-bin: false
          cache-targets: false
          prefix-key: v2-rust-ios

      - name: Set up just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Build Rust FFI bindings
        run: just build-ios

      - name: Verify iOS bindings are up to date
        shell: bash
        run: |
          bindings_path="ios/CoveCore/Sources/CoveCore/generated"
          status="$(git status --porcelain --untracked-files=all -- "$bindings_path")"

          if [[ -n "$status" ]]; then
            echo "iOS bindings are out of date. Run 'just build-ios' and commit the regenerated bindings."
            echo
            git status --short --untracked-files=all -- "$bindings_path"
            echo
            git diff --stat -- "$bindings_path" || true
            exit 1
          fi

      - name: Compile iOS
        run: cd ios && xcodebuild -scheme Cove -sdk iphonesimulator -arch arm64 build

  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      RUSTFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v6

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
          cache-bin: false
          prefix-key: v1-rust

      - name: Run tests
        run: cd rust && cargo test --workspace

  clippy:
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
          cache-bin: false
          prefix-key: v1-rust

      - run: cd rust && cargo clippy --all-targets --all-features -- -D warnings
